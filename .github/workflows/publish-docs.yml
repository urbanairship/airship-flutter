name: Publish Docs

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      GCP_SA_KEY:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish docs for (e.g. 12.0.0)'
        required: true
        type: string

env:
  FLUTTER_VERSION: 3.27.3

jobs:
  release-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ inputs.version }}

      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup GCP Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build & Package docs
        env:
          VERSION: ${{ inputs.version }}
        run: |
          bash ./scripts/docs.sh -gp $VERSION doc/api

      - name: Upload docs
        env:
          VERSION: ${{ inputs.version }}
        run: |
          gsutil cp doc/$VERSION.tar.gz gs://ua-web-ci-prod-docs-transfer/libraries/flutter/$VERSION.tar.gz

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: doc/api

  deploy-docs:
    needs: release-docs
    runs-on: ubuntu-latest
    continue-on-error: true # Remove when migration to GH Pages is complete
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
