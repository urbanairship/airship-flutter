name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

env:
  DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer
  FLUTTER_VERSION: 3.38.3
  JAVA_VERSION: "17.x"
  JAVA_DISTRIBUTION: 'zulu'

jobs:
  ci:
    runs-on: macos-26-xlarge

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v2
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{env.FLUTTER_VERSION}}
      - name: Run CI
        run: bash ./scripts/run_ci_tasks.sh

  release-plugin-pub-dev:
    needs: [ ci ]
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1

  release-plugin-github:
    runs-on: ubuntu-latest
    needs: [ ci , release-plugin-pub-dev ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT

      - name: Get the release notes
        id: get_release_notes
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          delimiter="$(openssl rand -hex 8)"
          {
            echo "NOTES<<${delimiter}"
            awk "/## Version $VERSION/{flag=1;next}/## Version/{flag=0}flag" CHANGELOG.md
            echo ${delimiter}
          } >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v2
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Flutter action
        uses: subosito/flutter-action@44ac965b96f18d999802d4b807e3256d5a3f9fa1
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get

      - name: Github Release
        uses: actions/create-release@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          release_name: ${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.get_release_notes.outputs.NOTES }}
          draft: false
          prerelease: false

  publish-docs:
    needs: [ ci, release-plugin-pub-dev, release-plugin-github ]
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/publish-docs.yml
    with:
      version: ${{ github.ref_name }}
    secrets: inherit

  notify-release:
    runs-on: ubuntu-latest
    if: always()
    needs: [ ci, release-plugin-pub-dev, release-plugin-github, publish-docs ]
    steps:
      - name: Slack Notification
        uses: homoluctus/slatify@master
        with:
          # && returns the string if truthy, so || short-circuits on the first match; 'success' is only reached if both contains() checks are false
          type: ${{ (contains(needs.*.result, 'failure') && 'failure') || (contains(needs.*.result, 'cancelled') && 'cancelled') || 'success' }}
          job_name: "Flutter Release"
          url: ${{ secrets.MOBILE_SLACK_WEBHOOK }}
